<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Get A Quote | Ten13 International</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#f5f7fb;
      color:#222;
    }

    .container{
      width:90%;
      max-width:700px;
      margin:60px auto;
      background:white;
      padding:50px;
      border-radius:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    h1{
      text-align:center;
      margin-bottom:10px;
      font-size:42px;
    }

    .subtitle{
      text-align:center;
      color:#666;
      margin-bottom:40px;
    }

    .input-group{
      margin-bottom:20px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      font-weight:500;
    }

    .input-group input,
    .input-group textarea{
      width:100%;
      padding:16px;
      border:1px solid #ddd;
      border-radius:12px;
      font-size:16px;
      font-family:'Poppins',sans-serif;
      outline:none;
      transition:0.3s;
    }

    .input-group input:focus,
    .input-group textarea:focus{
      border-color:#ffcc00;
      box-shadow:0 0 10px rgba(255,204,0,0.3);
    }

    textarea{
      resize:none;
    }

    .btn{
      width:100%;
      padding:16px;
      background:#ffcc00;
      border:none;
      border-radius:50px;
      font-size:18px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#111;
      color:white;
    }

    .back-home{
      display:block;
      text-align:center;
      margin-top:25px;
      color:#666;
      text-decoration:none;
    }

    @media(max-width:768px){

      .container{
        padding:30px;
      }

      h1{
        font-size:32px;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Get A Quote</h1>

    <p class="subtitle">
      Fill out the form below and our team will contact you shortly.
    </p>

    <form>

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your full name" required>
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="Enter your phone number" required>
      </div>

      <div class="input-group">
        <label>Home / Business Address</label>
        <input type="text" placeholder="Enter your address" required>
      </div>

      <div class="input-group">
        <label>Property Type</label>
        <input type="text" placeholder="House, Office, Factory, etc.">
      </div>

      <div class="input-group">
        <label>Additional Information</label>
        <textarea rows="6" placeholder="Tell us about your solar requirements"></textarea>
      </div>

      <button type="submit" class="btn">
        Submit Quote Request
      </button>

    </form>

    <a href="index.html" class="back-home">
      ← Back To Homepage
    </a>

  </div>

</body>
</html>
