<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Get A Quote | Ten13 International</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#f5f7fb;
      color:#222;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
    }

    .quote-container{
      width:100%;
      max-width:750px;
      background:white;
      padding:50px;
      border-radius:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .logo{
      text-align:center;
      font-size:38px;
      font-weight:700;
      color:#ffcc00;
      margin-bottom:15px;
    }

    h1{
      text-align:center;
      margin-bottom:10px;
      font-size:42px;
      color:#111;
    }

    .subtitle{
      text-align:center;
      color:#666;
      margin-bottom:40px;
    }

    .input-group{
      margin-bottom:22px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      font-weight:500;
      color:#111;
    }

    .input-group input,
    .input-group textarea,
    .input-group select{
      width:100%;
      padding:16px;
      border:1px solid #ddd;
      border-radius:12px;
      font-size:16px;
      font-family:'Poppins',sans-serif;
      outline:none;
      transition:0.3s;
      background:white;
    }

    .input-group input:focus,
    .input-group textarea:focus,
    .input-group select:focus{
      border-color:#ffcc00;
      box-shadow:0 0 10px rgba(255,204,0,0.25);
    }

    textarea{
      resize:none;
    }

    .submit-btn{
      width:100%;
      padding:18px;
      border:none;
      border-radius:50px;
      background:#ffcc00;
      color:#111;
      font-size:18px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
    }

    .submit-btn:hover{
      background:#111;
      color:white;
    }

    .contact-info{
      margin-top:40px;
      padding-top:30px;
      border-top:1px solid #eee;
      text-align:center;
    }

    .contact-info p{
      color:#666;
      margin-bottom:10px;
    }

    .contact-info strong{
      color:#111;
    }

    @media(max-width:768px){

      .quote-container{
        padding:30px;
      }

      h1{
        font-size:32px;
      }
    }

  </style>
</head>

<body>

  <div class="quote-container">

    <div class="logo">TEN13</div>

    <h1>Get A Free Quote</h1>

    <p class="subtitle">
      Fill in your details and our solar experts will contact you shortly.
    </p>

    <form>

      <div class="input-group">
        <label>Full Name</label>

        <input type="text"
        placeholder="Enter your full name"
        required>
      </div>

      <div class="input-group">
        <label>Email Address</label>

        <input type="email"
        placeholder="Enter your email address"
        required>
      </div>

      <div class="input-group">
        <label>Phone Number</label>

        <input type="tel"
        placeholder="Enter your phone number"
        required>
      </div>

      <div class="input-group">
        <label>Home / Business Address</label>

        <input type="text"
        placeholder="Enter your full address"
        required>
      </div>

      <div class="input-group">
        <label>Property Type</label>

        <select>
          <option>Select property type</option>
          <option>House</option>
          <option>Office</option>
          <option>Factory</option>
          <option>Commercial Building</option>
          <option>Other</option>
        </select>
      </div>

      <div class="input-group">
        <label>Monthly Electricity Bill (Optional)</label>

        <input type="text"
        placeholder="Example: RM 500">
      </div>

      <div class="input-group">
        <label>Additional Information</label>

        <textarea rows="6"
        placeholder="Tell us about your solar requirements"></textarea>
      </div>

      <button type="submit" class="submit-btn">
        Submit Quote Request
      </button>

    </form>

    <div class="contact-info">

      <p><strong>Phone:</strong> +60 16 8050264</p>

      <p><strong>Email:</strong> info@ten13.com.my</p>

      <p>
        <strong>Address:</strong>
        No. 1, Jalan MJ/3, Batu 7,
        Old Klang Road, Taman Medan Maju Jaya,
        46000 Petaling Jaya, Malaysia
      </p>

    </div>

  </div>

</body>
</html>
